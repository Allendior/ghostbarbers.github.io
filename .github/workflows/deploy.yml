name: Deploy Ghost Barbers to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure GitHub Pages is enabled with Actions source
        run: |
          # First try to create Pages (will 201 on success, 409 if already exists)
          CREATE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"workflow"}')
          CREATE_CODE=$(echo "$CREATE" | tail -1)
          CREATE_BODY=$(echo "$CREATE" | head -1)
          echo "Create response ($CREATE_CODE): $CREATE_BODY"

          # If already exists (409), update it to use Actions source
          if [ "$CREATE_CODE" = "409" ]; then
            UPDATE=$(curl -s -w "\n%{http_code}" \
              -X PUT \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/pages \
              -d '{"build_type":"workflow"}')
            UPDATE_CODE=$(echo "$UPDATE" | tail -1)
            UPDATE_BODY=$(echo "$UPDATE" | head -1)
            echo "Update response ($UPDATE_CODE): $UPDATE_BODY"
          fi

          # Verify Pages is now configured
          STATUS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages)
          echo "Pages status: $STATUS"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
