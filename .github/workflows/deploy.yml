name: Deploy Ghost Barbers to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The GITHUB_TOKEN here is the runner's token, not the user's personal token —
      # it has its own rate limit and won't be affected by personal API rate limits.
      - name: Enable GitHub Pages (idempotent)
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"workflow"}')
          # 201 = created, 409 = already exists — both are fine
          echo "Pages enable response code: $RESPONSE"
          if [ "$RESPONSE" != "201" ] && [ "$RESPONSE" != "409" ] && [ "$RESPONSE" != "422" ]; then
            echo "Warning: unexpected response $RESPONSE — continuing anyway"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
